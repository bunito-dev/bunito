name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck And Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

  tests:
    name: Test And Coverage
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: |
          mkdir -p artifacts
          bun run test \
          --reporter=junit \
          --reporter-outfile=artifacts/test-results.xml

      - name: Normalize JUnit report
        if: ${{ !cancelled() }}
        run: |
          ruby <<'RUBY'
          require 'rexml/document'

          input = 'artifacts/test-results.xml'
          output = 'artifacts/test-results.flattened.xml'

          source = REXML::Document.new(File.read(input))
          result = REXML::Document.new
          result << REXML::XMLDecl.new('1.0', 'UTF-8')

          root = REXML::Element.new('testsuites')
          source.root.attributes.each_attribute do |attribute|
            root.add_attribute(attribute.name, attribute.value)
          end

          source.root.each_element('testsuite') do |suite|
            test_cases = []
            suite.each_recursive do |element|
              test_cases << element if element.name == 'testcase'
            end

            next if test_cases.empty?

            flattened_suite = REXML::Element.new('testsuite')
            suite.attributes.each_attribute do |attribute|
              flattened_suite.add_attribute(attribute.name, attribute.value)
            end

            flattened_suite.add_attribute('tests', test_cases.length.to_s)
            flattened_suite.add_attribute('failures', test_cases.count { |test_case| test_case.elements['failure'] }.to_s)
            flattened_suite.add_attribute('errors', test_cases.count { |test_case| test_case.elements['error'] }.to_s)
            flattened_suite.add_attribute('skipped', test_cases.count { |test_case| test_case.elements['skipped'] }.to_s)

            test_cases.each do |test_case|
              flattened_suite.add_element(test_case.deep_clone)
            end

            root.add_element(flattened_suite)
          end

          result.add_element(root)

          formatter = REXML::Formatters::Pretty.new(2)
          formatter.compact = true

          File.open(output, 'w') do |file|
            formatter.write(result, file)
            file.write("\n")
          end
          RUBY

      - name: Publish test report
        if: ${{ !cancelled() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: dorny/test-reporter@v3
        with:
          name: Bun Tests
          path: artifacts/test-results.flattened.xml
          reporter: java-junit

      - name: Enforce coverage
        run: |
          mkdir -p artifacts
          bun run coverage \
          --coverage-reporter=text \
          --coverage-reporter=lcov \
          --coverage-dir=artifacts/coverage-report

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: artifacts/coverage-report
          if-no-files-found: error

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: artifacts/test-results.xml
          if-no-files-found: error
